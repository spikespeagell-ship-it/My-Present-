<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flores y Sorpresa</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600&family=Parisienne&display=swap" rel="stylesheet">
</head>
<body class="container">

 <div id="screen-flowers">
    <div class="night"></div>
    <div class="flowers">
      <!-- Flor 1 -->
      <div class="flower flower--1">
        <div class="flower__leafs flower__leafs--1">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__white-circle"></div>
          <div class="flower__light flower__light--1"></div>
          <div class="flower__light flower__light--2"></div>
          <div class="flower__light flower__light--3"></div>
          <div class="flower__light flower__light--4"></div>
        </div>
        <div class="flower__line"></div>
      </div>
      <!-- Flor 2 -->
      <div class="flower flower--2">
        <div class="flower__leafs flower__leafs--2">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__white-circle"></div>
          <div class="flower__light flower__light--1"></div>
        </div>
        <div class="flower__line"></div>
      </div>
      <!-- Flor 3 -->
      <div class="flower flower--3">
        <div class="flower__leafs flower__leafs--3">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__white-circle"></div>
        </div>
        <div class="flower__line"></div>
      </div>
    </div>
    
    <!-- Botón -->
    <div style="position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); z-index: 999;">
      <button class="btn" onclick="showLetter()">Ver mensaje sorpresa</button>
    </div>
  </div>

  <!-- PANTALLA 2: CARTA -->
  <div class="overlay-page" id="screen-letter" style="display: none;">
    <button class="btn-ghost" onclick="showFlowers()">← Volver</button>
    <div class="stage">
      <h1 class="caption">Para ti, mi amor </h1>
      <div class="heart-stage"><div class="heart-shape"></div>
        <div class="letter">
          <div class="greeting">Mi terreneitor, mi niña linda</div>
          <p>Queria prepararte esta carta para decirte te agradezco por hacerme mejorar cada dia </p>
            <p>Tambien para darte animos, en estos dias se que luego de tu esfuerzo lograras el nivel </p>
          <div class="signature"> Entonces tendremos una cena romantica, te adoro.</div> </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
